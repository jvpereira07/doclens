<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>DocLens - Extração de Documentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ffffff;
            --primary-light: #e5e5e5;
            --accent: #a3a3a3;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .brand span {
            color: var(--text-muted);
            font-weight: 300;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links li.active a {
            color: var(--primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 3rem;
            max-width: 1400px;
        }

        header {
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Split Layout */
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 992px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 2rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        select,
        input[type="file"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        select option {
            background-color: #121212;
            color: #ffffff;
        }

        select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: #e5e5e5;
        }

        /* JSON Result Panel */
        .result-panel {
            background-color: #0d0d0d;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
            font-family: monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            overflow-x: auto;
            color: #34d399;
            max-height: 400px;
        }

        .error-panel {
            background-color: rgba(244, 63, 94, 0.05);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: #fb7185;
            border-radius: 0.5rem;
            padding: 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        /* History Table */
        .history-section {
            margin-top: 3rem;
        }

        .history-section h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }

        .status-deprecated {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
        }

        /* Thumbnail styling */
        .thumbnail-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .thumbnail-img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 0.35rem;
            border: 1px solid var(--border-color);
            background-color: #000;
        }

        .file-link {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
        }

        .file-link:hover {
            text-decoration: underline;
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- Fixed Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            Doc<span>Lens</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/templates">Templates</a></li>
            <li><a href="/fields">Campos</a></li>
            <li class="active"><a href="/extraction">Extração</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1>Extração Multimodal</h1>
        </header>

        <div class="split-layout">
            <!-- Form Card -->
            <div class="card">
                <h2>Enviar Documento</h2>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="templateSelect">Template de Extração</label>
                        <select id="templateSelect" name="templateCode" required>
                            <option value="">-- Selecione o Template --</option>
                            <option th:each="t : ${templates}" th:value="${t.tag}"
                                th:text="${t.name} + ' (#' + ${t.tag} + ')'"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fileInput">Documento (Imagem ou PDF)</label>
                        <input type="file" id="fileInput" name="file" accept="image/*,application/pdf" required />
                    </div>

                    <button type="submit" class="btn btn-primary" id="btnSubmit">
                        Executar Extração
                    </button>
                </form>
            </div>

            <!-- Result Card -->
            <div class="card">
                <h2>Resultado JSON</h2>
                <div class="error-panel" id="errorPanel"></div>
                <pre class="result-panel" id="resultJson">{}</pre>
            </div>
        </div>

        <!-- History Section -->
        <div class="card history-section">
            <h2>Histórico de Extrações</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Arquivo Enviado (MinIO)</th>
                            <th>Template</th>
                            <th>Status</th>
                            <th>Delay</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ext : ${extractions}">
                            <td class="date-cell" th:data-timestamp="${ext.createdAt}" th:text="${ext.createdAt}">10/10/2026 15:30</td>
                            <td>
                                <div class="thumbnail-container" th:if="${ext.file != null}">
                                    <img class="thumbnail-img" th:src="@{/extraction/files/{id}(id=${ext.file.id})}" alt="Thumb" />
                                    <a class="file-link" th:href="@{/extraction/files/{id}(id=${ext.file.id})}" th:text="${ext.file.name}" target="_blank">documento.jpg</a>
                                </div>
                                <span th:if="${ext.file == null}">Sem arquivo</span>
                            </td>
                            <td th:text="${ext.template != null ? ext.template.name : 'N/A'}">RG</td>
                            <td>
                                <span class="badge" th:classappend="${ext.status.name() == 'SUCCESS' ? 'status-active' : 'status-deprecated'}" th:text="${ext.status}">SUCCESS</span>
                            </td>
                            <td th:text="${delays != null && delays.get(ext.id) != null ? delays.get(ext.id) + ' ms' : '-'}">-</td>
                            <td>
                                <div style="display: flex; gap: 0.5rem; align-items: center;">
                                    <button th:if="${ext.status.name() == 'SUCCESS'}" class="btn btn-view-json" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; border-radius: 0.35rem;" th:data-request-id="${ext.id}">
                                        Ver JSON
                                    </button>
                                    <button class="btn btn-view-prompt" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; border-radius: 0.35rem; background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border-color);" th:data-request-id="${ext.id}">
                                        Ver Prompt
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(extractions)}">
                            <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 2rem;">Nenhuma extração realizada ainda.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const errorPanel = document.getElementById('errorPanel');
        const resultJson = document.getElementById('resultJson');

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorPanel.style.display = 'none';
            resultJson.textContent = 'Processando...';
            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Enviando...';

            const formData = new FormData(uploadForm);

            try {
                const response = await fetch('/api/extraction', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    resultJson.textContent = JSON.stringify(result, null, 2);
                    // Reload window to show in history list
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                } else {
                    errorPanel.textContent = result.error || 'Erro na extração.';
                    errorPanel.style.display = 'block';
                    resultJson.textContent = '{}';
                }
            } catch (err) {
                errorPanel.textContent = 'Erro de rede ou servidor.';
                errorPanel.style.display = 'block';
                resultJson.textContent = '{}';
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'Executar Extração';
            }
        });

        async function loadJsonResult(requestId) {
            errorPanel.style.display = 'none';
            resultJson.textContent = 'Carregando resultado...';

            try {
                const response = await fetch(`/api/extraction/${requestId}/result`);
                const result = await response.json();

                if (response.ok) {
                    resultJson.textContent = JSON.stringify(result, null, 2);
                } else {
                    errorPanel.textContent = result.error || 'Erro ao carregar o JSON.';
                    errorPanel.style.display = 'block';
                    resultJson.textContent = '{}';
                }
            } catch (err) {
                errorPanel.textContent = 'Erro ao buscar o resultado do servidor.';
                errorPanel.style.display = 'block';
                resultJson.textContent = '{}';
            }
        }

        async function loadPrompt(requestId) {
            errorPanel.style.display = 'none';
            resultJson.textContent = 'Carregando prompt...';

            try {
                const response = await fetch(`/api/extraction/${requestId}/prompt`);
                const result = await response.json();

                if (response.ok) {
                    resultJson.textContent = result.prompt || 'Nenhum prompt registrado para esta extração.';
                } else {
                    errorPanel.textContent = result.error || 'Erro ao carregar o prompt.';
                    errorPanel.style.display = 'block';
                    resultJson.textContent = '{}';
                }
            } catch (err) {
                errorPanel.textContent = 'Erro ao buscar o prompt do servidor.';
                errorPanel.style.display = 'block';
                resultJson.textContent = '{}';
            }
        }

        // Format dates on load
        document.querySelectorAll('.date-cell').forEach(el => {
            const ts = el.getAttribute('data-timestamp');
            if (ts) {
                try {
                    const date = new Date(ts);
                    const day = String(date.getDate()).padStart(2, '0');
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const year = date.getFullYear();
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    el.textContent = `${day}/${month}/${year} ${hours}:${minutes}`;
                } catch (e) {
                    // fall back to default
                }
            }
        });

        // Add click listener for Ver JSON buttons
        document.querySelectorAll('.btn-view-json').forEach(btn => {
            btn.addEventListener('click', () => {
                const requestId = btn.getAttribute('data-request-id');
                loadJsonResult(requestId);
            });
        });

        // Add click listener for Ver Prompt buttons
        document.querySelectorAll('.btn-view-prompt').forEach(btn => {
            btn.addEventListener('click', () => {
                const requestId = btn.getAttribute('data-request-id');
                loadPrompt(requestId);
            });
        });
    </script>
</body>

</html>
