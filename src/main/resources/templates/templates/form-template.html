<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DocLens - Salvar Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ffffff;
            --primary-light: #e5e5e5;
            --accent: #a3a3a3;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .brand span {
            color: var(--text-muted);
            font-weight: 300;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .nav-links a:hover, .nav-links li.active a {
            color: var(--primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 3rem;
            max-width: 1400px;
        }

        header {
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Card Container */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 2.5rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        select option {
            background-color: #121212;
            color: #ffffff;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: #e5e5e5;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-danger {
            background: rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-danger:hover {
            background: #ffffff;
            color: #000000;
        }

        .btn-add {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-add:hover {
            background: #ffffff;
            color: #000000;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
        }

        /* Tree Styles */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        .section-title span {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .tree-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tree-node {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
        }

        .node-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .node-input-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 1;
            min-width: 150px;
        }

        .node-input-group.checkbox-item {
            flex-direction: row;
            align-items: center;
            gap: 0.5rem;
            min-width: unset;
        }

        .node-input-group.checkbox-item label {
            margin-bottom: 0;
            cursor: pointer;
            text-transform: none;
            font-size: 0.9rem;
        }

        .node-input-group.checkbox-item input {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .node-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .node-children {
            margin-left: 2rem;
            padding-left: 1rem;
            border-left: 1px dashed var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Fixed Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            Doc<span>Lens</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li class="active"><a href="/templates">Templates</a></li>
            <li><a href="/fields">Campos</a></li>
            <li><a href="/extraction">Extração</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1 th:text="${templateId == null} ? 'Novo Template' : 'Editar Template'">Salvar Template</h1>
        </header>

        <div class="card">
            <form th:action="${templateId == null} ? '/templates' : '/templates/edit/' + ${templateId}" 
                  th:object="${template}" method="post" id="templateForm">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="tag">Tag Única</label>
                        <input type="text" id="tag" th:field="*{tag}" placeholder="Ex: NOTA_FISCAL" required th:readonly="${templateId != null}" />
                    </div>

                    <div class="form-group">
                        <label for="name">Nome Amigável</label>
                        <input type="text" id="name" th:field="*{name}" placeholder="Ex: Nota Fiscal" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Descrição</label>
                    <textarea id="description" th:field="*{description}" rows="2" placeholder="Breve descrição do template..."></textarea>
                </div>

                <div class="form-group">
                    <label for="propHints">Instruções para IA (Prop Hints)</label>
                    <textarea id="propHints" th:field="*{propHints}" rows="2" placeholder="Instruções específicas para a extração do Gemini..."></textarea>
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" th:field="*{status}">
                        <option th:each="st : ${T(com.jvpereira.doclens.model.template.TemplateStatus).values()}" 
                                th:value="${st}" th:text="${st}">DRAFT</option>
                    </select>
                </div>

                <!-- Fields Section -->
                <div class="section-title">
                    <span>Estrutura de Campos</span>
                    <button type="button" class="btn btn-add btn-sm" onclick="addRootField()">+ Adicionar Campo Raiz</button>
                </div>

                <!-- Container para a árvore interativa -->
                <div id="fieldsTreeContainer" class="tree-container"></div>

                <!-- Hidden inputs container generated dynamically on submit -->
                <div id="hiddenInputsContainer" style="display: none;"></div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Salvar</button>
                    <a href="/templates" class="btn btn-secondary" style="flex: 1;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <script th:inline="javascript">
        /*<![CDATA[*/
        // Campos iniciais fornecidos pelo servidor
        const initialFields = /*[[${template.fields}]]*/ [];
        
        // Estrutura de árvore interna no JS
        let treeData = [];

        // Inicializa a árvore a partir da lista plana do Thymeleaf
        function initTree() {
            if (!initialFields || initialFields.length === 0) {
                return;
            }

            // Criar nós e indexar por código
            const nodesMap = {};
            initialFields.forEach(f => {
                const isListVal = (f.type === 'LIST');
                const isCompositeVal = (f.type === 'COMPOSITE');
                nodesMap[f.code] = {
                    id: generateId(),
                    code: f.code || "",
                    name: f.name || "",
                    type: (isListVal || isCompositeVal) ? "STRING" : f.type,
                    required: f.required || false,
                    isList: isListVal,
                    parentFieldCode: f.parentFieldCode || "",
                    children: []
                };
            });

            // Ligar nós filhos aos pais correspondentes
            initialFields.forEach(f => {
                const node = nodesMap[f.code];
                if (f.parentFieldCode && nodesMap[f.parentFieldCode]) {
                    nodesMap[f.parentFieldCode].children.push(node);
                } else {
                    treeData.push(node);
                }
            });
        }

        function generateId() {
            return Math.random().toString(36).substring(2, 9);
        }

        function addRootField() {
            const newNode = {
                id: generateId(),
                code: "",
                name: "",
                type: "STRING",
                required: false,
                isList: false,
                parentFieldCode: "",
                children: []
            };
            treeData.push(newNode);
            renderTree();
        }

        function addChildField(parentId) {
            const parentNode = findNodeById(treeData, parentId);
            if (parentNode) {
                const newNode = {
                    id: generateId(),
                    code: "",
                    name: "",
                    type: "STRING",
                    required: false,
                    isList: false,
                    parentFieldCode: parentNode.code,
                    children: []
                };
                parentNode.children.push(newNode);
                renderTree();
            }
        }

        function removeNode(id) {
            treeData = removeNodeById(treeData, id);
            renderTree();
        }

        function findNodeById(nodes, id) {
            for (let node of nodes) {
                if (node.id === id) return node;
                if (node.children && node.children.length > 0) {
                    const found = findNodeById(node.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function removeNodeById(nodes, id) {
            return nodes.filter(node => {
                if (node.id === id) return false;
                if (node.children && node.children.length > 0) {
                    node.children = removeNodeById(node.children, id);
                }
                return true;
            });
        }

        // Renderiza a árvore recursivamente no DOM
        function renderTree() {
            const container = document.getElementById('fieldsTreeContainer');
            container.innerHTML = "";
            if (treeData.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 2rem;">Nenhum campo cadastrado. Clique em "Adicionar Campo Raiz".</div>`;
                return;
            }
            treeData.forEach(node => {
                container.appendChild(createNodeElement(node));
            });
        }

        function createNodeElement(node) {
            const el = document.createElement('div');
            el.className = 'tree-node';
            el.id = `node-${node.id}`;

            const hasChildren = node.children && node.children.length > 0;

            el.innerHTML = `
                <div class="node-row">
                    <div class="node-input-group">
                        <label>Código Único</label>
                        <input type="text" class="node-code" value="${node.code}" placeholder="codigo_campo" required />
                    </div>
                    <div class="node-input-group">
                        <label>Nome Exibido</label>
                        <input type="text" class="node-name" value="${node.name}" placeholder="Nome do Campo" required />
                    </div>
                    <div class="node-input-group node-type-group" style="${hasChildren ? 'display: none;' : ''}">
                        <label>Tipo do Dado</label>
                        <select class="node-type">
                            <option value="STRING" ${node.type === 'STRING' ? 'selected' : ''}>STRING</option>
                            <option value="NUMBER" ${node.type === 'NUMBER' ? 'selected' : ''}>NUMBER</option>
                            <option value="DATE" ${node.type === 'DATE' ? 'selected' : ''}>DATE</option>
                            <option value="BOOLEAN" ${node.type === 'BOOLEAN' ? 'selected' : ''}>BOOLEAN</option>
                        </select>
                    </div>
                    <div class="node-input-group checkbox-item">
                        <input type="checkbox" class="node-required" ${node.required ? 'checked' : ''} id="req-${node.id}" />
                        <label for="req-${node.id}">Obrigatório</label>
                    </div>
                    <div class="node-input-group checkbox-item">
                        <input type="checkbox" class="node-islist" ${node.isList ? 'checked' : ''} id="list-${node.id}" />
                        <label for="list-${node.id}">É Lista (Se repete)</label>
                    </div>
                    <div class="node-actions">
                        <button type="button" class="btn btn-add btn-sm" onclick="addChildField('${node.id}')">+ Subcampo</button>
                        <button type="button" class="btn btn-danger btn-sm" onclick="removeNode('${node.id}')">Remover</button>
                    </div>
                </div>
                <div class="node-children" id="children-${node.id}"></div>
            `;

            // Escuta alterações de inputs e sincroniza no objeto da árvore
            el.querySelector('.node-code').addEventListener('input', (e) => {
                node.code = e.target.value.trim();
                // Atualiza parentFieldCode dos filhos em tempo real
                node.children.forEach(c => c.parentFieldCode = node.code);
            });
            el.querySelector('.node-name').addEventListener('input', (e) => {
                node.name = e.target.value.trim();
            });
            el.querySelector('.node-type').addEventListener('change', (e) => {
                node.type = e.target.value;
            });
            el.querySelector('.node-required').addEventListener('change', (e) => {
                node.required = e.target.checked;
            });
            el.querySelector('.node-islist').addEventListener('change', (e) => {
                node.isList = e.target.checked;
            });

            // Adiciona nós filhos recursivamente
            if (hasChildren) {
                const childrenContainer = el.querySelector(`#children-${node.id}`);
                node.children.forEach(child => {
                    child.parentFieldCode = node.code;
                    childrenContainer.appendChild(createNodeElement(child));
                });
            }

            return el;
        }

        // Reconstrói a árvore de dados em lista plana antes do submit
        function flattenTree(nodes, flatList) {
            nodes.forEach(node => {
                const hasChildren = node.children && node.children.length > 0;
                let finalType = node.type;
                if (hasChildren) {
                    finalType = node.isList ? "LIST" : "COMPOSITE";
                } else if (node.isList) {
                    finalType = "LIST";
                }

                flatList.push({
                    code: node.code,
                    name: node.name,
                    type: finalType,
                    required: node.required,
                    parentFieldCode: node.parentFieldCode
                });

                if (hasChildren) {
                    flattenTree(node.children, flatList);
                }
            });
        }

        // Intercepta o envio do formulário para gerar os inputs ocultos correspondentes à lista plana
        const templateForm = document.getElementById('templateForm');
        templateForm.addEventListener('submit', (e) => {
            const flatList = [];
            flattenTree(treeData, flatList);

            // Validação de códigos duplicados ou vazios
            const codes = flatList.map(f => f.code.trim());
            if (codes.some(c => c === "")) {
                alert("Todos os campos devem possuir um Código Único preenchido!");
                e.preventDefault();
                return;
            }
            const uniqueCodes = new Set(codes);
            if (uniqueCodes.size !== codes.length) {
                alert("Erro: Há códigos duplicados na sua estrutura de campos!");
                e.preventDefault();
                return;
            }

            // Gerar inputs ocultos no DOM para o Spring bindar
            const hiddenContainer = document.getElementById('hiddenInputsContainer');
            hiddenContainer.innerHTML = "";

            flatList.forEach((f, i) => {
                hiddenContainer.innerHTML += `
                    <input type="hidden" name="fields[${i}].code" value="${f.code}" />
                    <input type="hidden" name="fields[${i}].name" value="${f.name}" />
                    <input type="hidden" name="fields[${i}].type" value="${f.type}" />
                    <input type="hidden" name="fields[${i}].required" value="${f.required}" />
                    <input type="hidden" name="fields[${i}].parentFieldCode" value="${f.parentFieldCode}" />
                `;
            });
        });

        // Inicialização
        initTree();
        renderTree();
        /*]]>*/
    </script>
</body>
</html>
