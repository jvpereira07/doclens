<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DocLens - Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ffffff;
            --primary-light: #e5e5e5;
            --accent: #a3a3a3;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --success: #ffffff;
            --danger: #444444;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        .logo-container {
            margin-bottom: 3.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #ffffff;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000000;
            font-size: 1.2rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .menu-item a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.25rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .menu-item a:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .menu-item.active a {
            color: #000000;
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        /* Main Workspace */
        .workspace {
            margin-left: var(--sidebar-width);
            padding: 3rem 4rem;
            flex-grow: 1;
            max-width: calc(100% - var(--sidebar-width));
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: #e5e5e5;
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-danger:hover {
            background: #ffffff;
            color: #000000;
        }

        /* Template Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .card-tag {
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: 700;
            color: #818cf8;
            background: rgba(99, 102, 241, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }

        .card-status {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }

        .status-draft {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
        }

        .status-deprecated {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .card-description {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .card-actions form {
            flex: 1;
        }

        .card-actions .btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Fixed Sidebar -->
    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">D</div>
            <span class="logo-text">DocLens</span>
        </div>
        <nav>
            <ul class="menu-list">
                <li class="menu-item active">
                    <a href="/templates">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                        Templates
                    </a>
                </li>
                <li class="menu-item">
                    <a href="/fields">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                        Campos
                    </a>
                </li>
                <li class="menu-item">
                    <a href="/extraction">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Extração
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
        <div class="workspace-header">
            <h1 class="page-title">Templates</h1>
            <a href="/templates/new" class="btn btn-primary">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                Novo Template
            </a>
        </div>

        <div class="grid">
            <div class="card" th:each="t : ${templates}">
                <div>
                    <div class="card-header">
                        <span class="card-tag" th:text="'#' + ${t.tag}">#TAG</span>
                        <span class="card-status" 
                              th:classappend="${t.status.name() == 'ACTIVE' ? 'status-active' : (t.status.name() == 'DRAFT' ? 'status-draft' : 'status-deprecated')}"
                              th:text="${t.status}">DRAFT</span>
                    </div>
                    <h3 class="card-title" th:text="${t.name}">Template Name</h3>
                    <p class="card-description" th:text="${t.description}">Template description goes here.</p>
                </div>
                <div>
                    <div class="card-meta">
                        <span>Campos associados</span>
                        <span style="font-weight: 600;" th:text="${t.fields != null ? t.fields.size() : 0}">0</span>
                    </div>
                    <div class="card-actions">
                        <a th:href="@{/templates/edit/{id}(id=${t.id})}" class="btn btn-secondary" style="flex: 1;">Editar</a>
                        <form th:action="@{/templates/delete/{id}(id=${t.id})}" method="post">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Deseja excluir este template?')">Excluir</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
