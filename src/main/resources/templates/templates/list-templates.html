<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DocLens - Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ffffff;
            --primary-light: #e5e5e5;
            --accent: #a3a3a3;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .brand span {
            color: var(--text-muted);
            font-weight: 300;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .nav-links a:hover, .nav-links li.active a {
            color: var(--primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 3rem;
            max-width: 1400px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: #e5e5e5;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-danger {
            background: rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-danger:hover {
            background: #ffffff;
            color: #000000;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1.5rem;
            min-height: 250px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .card-tag {
            font-family: monospace;
            font-weight: 700;
            color: var(--primary-light);
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }

        .status-draft {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
        }

        .status-deprecated {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-description {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .card-actions form {
            flex: 1;
            display: flex;
        }

        .card-actions form .btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Fixed Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            Doc<span>Lens</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li class="active"><a href="/templates">Templates</a></li>
            <li><a href="/fields">Campos</a></li>
            <li><a href="/extraction">Extração</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1>Templates</h1>
            <a href="/templates/new" class="btn btn-primary">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                Novo Template
            </a>
        </header>

        <div class="grid">
            <div class="card" th:each="t : ${templates}">
                <div>
                    <div class="card-header">
                        <span class="card-tag" th:text="'#' + ${t.tag}">#TAG</span>
                        <span class="badge" 
                              th:classappend="${t.status.name() == 'ACTIVE' ? 'status-active' : (t.status.name() == 'DRAFT' ? 'status-draft' : 'status-deprecated')}"
                              th:text="${t.status}">DRAFT</span>
                    </div>
                    <h3 class="card-title" th:text="${t.name}">Template Name</h3>
                    <p class="card-description" th:text="${t.description}">Template description.</p>
                </div>
                <div>
                    <div class="card-meta">
                        <span>Campos associados</span>
                        <span style="font-weight: 600;" th:text="${t.fields != null ? t.fields.size() : 0}">0</span>
                    </div>
                    <div class="card-actions">
                        <a th:href="@{/templates/edit/{id}(id=${t.id})}" class="btn btn-secondary" style="flex: 1;">Editar</a>
                        <form th:action="@{/templates/delete/{id}(id=${t.id})}" method="post">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Deseja excluir este template?')">Excluir</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
