<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DocLens - Salvar Campo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ffffff;
            --primary-light: #e5e5e5;
            --accent: #a3a3a3;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .brand span {
            color: var(--text-muted);
            font-weight: 300;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .nav-links a:hover, .nav-links li.active a {
            color: var(--primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 3rem;
            max-width: 1400px;
        }

        header {
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Card Container */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 2.5rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            max-width: 800px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        select option {
            background-color: #121212;
            color: #ffffff;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            margin-top: 1rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: #e5e5e5;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <!-- Fixed Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            Doc<span>Lens</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/templates">Templates</a></li>
            <li class="active"><a href="/fields">Campos</a></li>
            <li><a href="/extraction">Extração</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1 th:text="${fieldId == null} ? 'Novo Campo' : 'Editar Campo'">Salvar Campo</h1>
        </header>

        <div class="card">
            <form th:action="${fieldId == null} ? '/fields' : '/fields/edit/' + ${fieldId}" 
                  th:object="${field}" method="post">
                
                <div class="form-group">
                    <label for="code">Código Único (Code)</label>
                    <input type="text" id="code" th:field="*{code}" placeholder="Ex: numero_documento" required th:readonly="${fieldId != null}" />
                </div>

                <div class="form-group">
                    <label for="name">Nome Exibido</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="Ex: Número do Documento" required />
                </div>

                <div class="form-group">
                    <label for="description">Descrição</label>
                    <textarea id="description" th:field="*{description}" rows="3" placeholder="Instruções para localizar este campo..."></textarea>
                </div>

                <div class="form-group">
                    <label for="type">Tipo do Campo</label>
                    <select id="type" th:field="*{type}">
                        <option th:each="tp : ${fieldTypes}" th:value="${tp}" th:text="${tp}">STRING</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="templateId">Template Associado</label>
                    <select id="templateId" th:field="*{templateId}">
                        <option value="">Nenhum</option>
                        <option th:each="t : ${templates}" th:value="${t.id}" th:text="${t.name} + ' (#' + ${t.tag} + ')'"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="parentFieldId">Campo Pai (Se for subcampo)</label>
                    <select id="parentFieldId" th:field="*{parentFieldId}">
                        <option value="">Nenhum (Campo Raiz)</option>
                        <option th:each="pf : ${parentFields}" th:value="${pf.id}" th:text="${pf.name} + ' (' + ${pf.code} + ')'"></option>
                    </select>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="required" th:field="*{required}" />
                    <label for="required">Este campo é obrigatório para extração</label>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Salvar</button>
                    <a href="/fields" class="btn btn-secondary" style="flex: 1;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
