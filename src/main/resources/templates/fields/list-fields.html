<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DocLens - Campos de Extração</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ffffff;
            --primary-light: #e5e5e5;
            --accent: #a3a3a3;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .brand span {
            color: var(--text-muted);
            font-weight: 300;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .nav-links a:hover, .nav-links li.active a {
            color: var(--primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 3rem;
            max-width: 1400px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: #e5e5e5;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 0.35rem;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-danger:hover {
            background: #ffffff;
            color: #000000;
        }

        /* Table Card Container */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 2rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        td {
            padding: 1.1rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 0.95rem;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
        }

        .badge-required {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
        }

        .badge-optional {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }

        .actions-cell form {
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- Fixed Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            Doc<span>Lens</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/templates">Templates</a></li>
            <li class="active"><a href="/fields">Campos</a></li>
            <li><a href="/extraction">Extração</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1>Campos de Extração</h1>
            <a href="/fields/new" class="btn btn-primary">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                Novo Campo
            </a>
        </header>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Obrigatoriedade</th>
                        <th>Pai</th>
                        <th>ID Template Associado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${fields}">
                        <td style="font-family: monospace; color: var(--primary-light); font-weight: 600;" th:text="${f.code}">FIELD_CODE</td>
                        <td th:text="${f.name}">Field Name</td>
                        <td th:text="${f.type}">STRING</td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${f.required ? 'badge-required' : 'badge-optional'}"
                                  th:text="${f.required ? 'Obrigatório' : 'Opcional'}">Opcional</span>
                        </td>
                        <td style="font-family: monospace; font-size: 0.9rem;" th:text="${f.parentFieldCode != null ? f.parentFieldCode : '-'}">-</td>
                        <td style="font-family: monospace; font-size: 0.85rem;" th:text="${f.templateId != null ? f.templateId : 'Nenhum'}">Nenhum</td>
                        <td class="actions-cell">
                            <a th:href="@{/fields/edit/{id}(id=${f.id})}" class="btn btn-secondary btn-sm">Editar</a>
                            <form th:action="@{/fields/delete/{id}(id=${f.id})}" method="post">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Deseja excluir este campo?')">Excluir</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(fields)}">
                        <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 2rem;">Nenhum campo registrado ainda.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
