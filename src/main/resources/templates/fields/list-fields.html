<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DocLens - Campos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ffffff;
            --primary-light: #e5e5e5;
            --accent: #a3a3a3;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --success: #ffffff;
            --danger: #444444;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        .logo-container {
            margin-bottom: 3.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #ffffff;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000000;
            font-size: 1.2rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .menu-item a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.25rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .menu-item a:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .menu-item.active a {
            color: #000000;
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        /* Workspace */
        .workspace {
            margin-left: var(--sidebar-width);
            padding: 3rem 4rem;
            flex-grow: 1;
            max-width: calc(100% - var(--sidebar-width));
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: #e5e5e5;
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 0.35rem;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-danger:hover {
            background: #ffffff;
            color: #000000;
        }

        /* Table Card Container */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 2rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        td {
            padding: 1.1rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 0.95rem;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
        }

        .badge-required {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
        }

        .badge-optional {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Fixed Sidebar -->
    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">D</div>
            <span class="logo-text">DocLens</span>
        </div>
        <nav>
            <ul class="menu-list">
                <li class="menu-item">
                    <a href="/templates">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                        Templates
                    </a>
                </li>
                <li class="menu-item active">
                    <a href="/fields">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                        Campos
                    </a>
                </li>
                <li class="menu-item">
                    <a href="/extraction">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Extração
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
        <div class="workspace-header">
            <h1 class="page-title">Campos de Extração</h1>
            <a href="/fields/new" class="btn btn-primary">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                Novo Campo
            </a>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Obrigatoriedade</th>
                        <th>ID Template Associado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${fields}">
                        <td style="font-family: monospace; color: var(--primary-light); font-weight: 600;" th:text="${f.code}">FIELD_CODE</td>
                        <td th:text="${f.name}">Field Name</td>
                        <td th:text="${f.type}">STRING</td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${f.required ? 'badge-required' : 'badge-optional'}"
                                  th:text="${f.required ? 'Obrigatório' : 'Opcional'}">Opcional</span>
                        </td>
                        <td style="font-family: monospace; font-size: 0.85rem;" th:text="${f.templateId != null ? f.templateId : 'Nenhum'}">UUID ou Nenhum</td>
                        <td class="actions-cell">
                            <a th:href="@{/fields/edit/{id}(id=${f.id})}" class="btn btn-secondary btn-sm">Editar</a>
                            <form th:action="@{/fields/delete/{id}(id=${f.id})}" method="post">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Deseja excluir este campo?')">Excluir</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
